<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Shell exec safety block</title>
  <desc id="desc">Public-safe evidence card showing why raw shell_exec is no longer exposed in the Web ChatGPT connector profile.</desc>
  <rect width="1200" height="675" rx="36" fill="#0f172a"/>
  <rect x="50" y="50" width="1100" height="575" rx="30" fill="#111827" stroke="#334155"/>
  <rect x="90" y="96" width="680" height="230" rx="28" fill="#dbeafe"/>
  <text x="128" y="145" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#0f2f5f">Requested MCP action</text>
  <text x="128" y="193" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#0f2f5f">tool: shell_exec</text>
  <text x="128" y="232" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#0f2f5f">projectPath: &lt;approved-workspace&gt;</text>
  <text x="128" y="271" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#0f2f5f">command: pwd &amp;&amp; ls -la | head -20</text>
  <rect x="90" y="376" width="1020" height="118" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="128" y="424" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#9a3412">Blocked by hosted ChatGPT safety checks</text>
  <text x="128" y="463" font-family="Inter, Arial, sans-serif" font-size="22" fill="#9a3412">The request can be stopped before it reaches the local bridge.</text>
  <rect x="90" y="526" width="1020" height="56" rx="18" fill="#dcfce7"/>
  <text x="124" y="562" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">Decision: Web ChatGPT profile excludes shell_exec. Use batch_read or Handoff -> Codex Runner instead.</text>
  <circle cx="986" cy="177" r="74" fill="#ef4444"/>
  <path d="M955 177h62" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <text x="894" y="288" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#e5e7eb">No raw shell proxy</text>
</svg>
